name: CI

on:
  push:
  pull_request:

jobs:
  contracts:
    name: contracts · forge build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Fetch Solidity deps (pinned)
        run: |
          mkdir -p lib
          git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
          git clone --depth 1 https://github.com/transmissions11/solmate lib/solmate
          git clone --depth 1 --branch v5.1.0 https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vv

  offchain:
    name: offchain · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: offchain
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install
        run: npm install --no-audit --no-fund

      - name: typecheck
        run: npx tsc --noEmit
