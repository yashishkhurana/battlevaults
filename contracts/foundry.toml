[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.21"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "solmate/=lib/solmate/src/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

# Fork the demo against Base mainnet so real USYC / perps / liquidity exist.
[rpc_endpoints]
base = "${BASE_RPC_URL}"

# Run:  forge test --fork-url $BASE_RPC_URL
